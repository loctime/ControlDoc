    <!-- 🚫 SUPRESIÓN AGRESIVA DE FUENTES PDF.js - DEBE IR PRIMERO -->
    <link rel="stylesheet" href="/pdf-font-override.css" />
    <!-- 🔧 Polyfill para Request/Response API -->
    <script>
      (function() {
        'use strict';
        // Asegurar que Request y Response estén disponibles globalmente
        // Esto previene el error "Cannot destructure property 'Request' of 'undefined'"
        if (typeof globalThis !== 'undefined') {
          // Asegurar que Request esté disponible
          if (!globalThis.Request) {
            try {
              // Intentar usar el Request nativo del navegador
              if (typeof Request !== 'undefined') {
                globalThis.Request = Request;
              } else if (typeof window !== 'undefined' && window.Request) {
                globalThis.Request = window.Request;
              }
            } catch (e) {
              console.warn('Request no disponible nativamente');
            }
          }
          // Asegurar que Response esté disponible
          if (!globalThis.Response) {
            try {
              if (typeof Response !== 'undefined') {
                globalThis.Response = Response;
              } else if (typeof window !== 'undefined' && window.Response) {
                globalThis.Response = window.Response;
              }
            } catch (e) {
              console.warn('Response no disponible nativamente');
            }
          }
        }
        // Asegurar que Request y Response estén en window también
        if (typeof window !== 'undefined') {
          if (!window.Request && typeof Request !== 'undefined') {
            window.Request = Request;
          }
          if (!window.Response && typeof Response !== 'undefined') {
            window.Response = Response;
          }
        }
      })();
    </script>
    <script>
      // SUPRESIÓN AGRESIVA DE ADVERTENCIAS DE FUENTES PDF.js
      // Este script se ejecuta ANTES que PDF.js para interceptar todas las advertencias
      
      (function() {
        'use strict';
        
        console.log('🔇 Iniciando supresión agresiva de advertencias de fuentes PDF.js...');
        
        // Función para detectar advertencias de fuentes
        const isFontWarning = (message) => {
          if (!message || typeof message !== 'string') return false;
          const lowerMessage = message.toLowerCase();
          return (
            lowerMessage.includes('arialroundedmtbold') ||
            lowerMessage.includes('arialroundedmt') ||
            lowerMessage.includes('arialroundedmtpro') ||
            lowerMessage.includes('cannot load system font') ||
            lowerMessage.includes('installing it could help') ||
            lowerMessage.includes('pdf rendering') ||
            lowerMessage.includes('system font')
          );
        };

        // Suprimir console.warn
        const originalWarn = console.warn;
        console.warn = function(...args) {
          const message = args.join(' ');
          if (isFontWarning(message)) {
            return; // No mostrar advertencias de fuentes
          }
          originalWarn.apply(console, args);
        };

        // Suprimir console.error
        const originalError = console.error;
        console.error = function(...args) {
          const message = args.join(' ');
          if (isFontWarning(message)) {
            return; // No mostrar errores de fuentes
          }
          originalError.apply(console, args);
        };

        // Suprimir console.log
        const originalLog = console.log;
        console.log = function(...args) {
          const message = args.join(' ');
          if (isFontWarning(message)) {
            return; // No mostrar logs de fuentes
          }
          originalLog.apply(console, args);
        };

        // Suprimir console.info
        const originalInfo = console.info;
        console.info = function(...args) {
          const message = args.join(' ');
          if (isFontWarning(message)) {
            return; // No mostrar info de fuentes
          }
          originalInfo.apply(console, args);
        };

        // Interceptar Web Workers
        const originalWorker = window.Worker;
        window.Worker = function(scriptURL, options) {
          const worker = new originalWorker(scriptURL, options);
          
          // Interceptar mensajes del worker
          const originalPostMessage = worker.postMessage;
          worker.postMessage = function(message, transfer) {
            let messageString = '';
            try {
              messageString = typeof message === 'string' ? message : JSON.stringify(message);
            } catch (e) {
              messageString = String(message);
            }
            
            if (isFontWarning(messageString)) {
              return; // No enviar mensajes de fuentes
            }
            originalPostMessage.call(this, message, transfer);
          };
          
          return worker;
        };

        // Interceptar addEventListener para mensajes
        const originalAddEventListener = window.addEventListener;
        window.addEventListener = function(type, listener, options) {
          if (type === 'message') {
            const wrappedListener = function(event) {
              if (event.data) {
                let dataString = '';
                try {
                  dataString = typeof event.data === 'string' ? event.data : JSON.stringify(event.data);
                } catch (e) {
                  dataString = String(event.data);
                }
                
                if (isFontWarning(dataString)) {
                  return; // No procesar mensajes de fuentes
                }
              }
              listener.call(this, event);
            };
            return originalAddEventListener.call(this, type, wrappedListener, options);
          }
          return originalAddEventListener.call(this, type, listener, options);
        };

        // Interceptar postMessage
        const originalPostMessage = window.postMessage;
        window.postMessage = function(message, targetOrigin, transfer) {
          let messageString = '';
          try {
            messageString = typeof message === 'string' ? message : JSON.stringify(message);
          } catch (e) {
            messageString = String(message);
          }
          
          if (isFontWarning(messageString)) {
            return; // No enviar mensajes de fuentes
          }
          originalPostMessage.call(this, message, targetOrigin, transfer);
        };

        // Interceptar onmessage
        if (window.onmessage) {
          const originalOnMessage = window.onmessage;
          window.onmessage = function(event) {
            if (event.data) {
              let dataString = '';
              try {
                dataString = typeof event.data === 'string' ? event.data : JSON.stringify(event.data);
              } catch (e) {
                dataString = String(event.data);
              }
              
              if (isFontWarning(dataString)) {
                return; // No procesar mensajes de fuentes
              }
            }
            originalOnMessage.call(this, event);
          };
        }

        // Interceptar Object.defineProperty para onmessage
        const originalDefineProperty = Object.defineProperty;
        Object.defineProperty = function(obj, prop, descriptor) {
          if (prop === 'onmessage' && descriptor.value) {
            const originalValue = descriptor.value;
            descriptor.value = function(event) {
              if (event.data) {
                let dataString = '';
                try {
                  dataString = typeof event.data === 'string' ? event.data : JSON.stringify(event.data);
                } catch (e) {
                  dataString = String(event.data);
                }
                
                if (isFontWarning(dataString)) {
                  return; // No procesar mensajes de fuentes
                }
              }
              originalValue.call(this, event);
            };
          }
          return originalDefineProperty.call(this, obj, prop, descriptor);
        };

        // Interceptar cualquier propiedad que pueda contener mensajes de fuentes
        const originalSetAttribute = Element.prototype.setAttribute;
        Element.prototype.setAttribute = function(name, value) {
          if (name === 'onmessage' && typeof value === 'string' && isFontWarning(value)) {
            return; // No establecer onmessage con advertencias de fuentes
          }
          originalSetAttribute.call(this, name, value);
        };

        console.log('✅ Supresión agresiva de advertencias de fuentes PDF.js activada');
      })();
    </script>
